<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA Selector · adaptative.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --bg2: #111111;
  --bg3: #1a1a1a;
  --bg4: #222222;
  --bg5: #2a2a2a;
  --fg: #f0f0f0;
  --fg2: #aaaaaa;
  --fg3: #666666;
  --azure: #3B82F6;
  --azure-dim: rgba(59,130,246,0.15);
  --azure-hover: #2563EB;
  --red: #dc2626;
  --green: #16a34a;
  --amber: #d97706;
  --border: rgba(255,255,255,0.08);
  --border-az: rgba(59,130,246,0.4);
  --radius: 8px;
  --font: 'Inter', system-ui, -apple-system, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--fg);font-family:var(--font);font-size:14px;line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:var(--azure);text-decoration:none}
button{cursor:pointer;font-family:var(--font)}

/* ── LAYOUT ── */
#app{min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:15px;font-weight:700;letter-spacing:-0.02em;color:var(--fg)}
.logo .dot{color:var(--red)}
.step-label{font-size:12px;color:var(--fg3);font-family:var(--mono)}

.progress-wrap{background:var(--bg);border-bottom:1px solid var(--border);padding:12px 24px}
.progress-steps{display:flex;gap:8px;max-width:600px;margin:0 auto}
.ps{flex:1;height:3px;border-radius:2px;background:var(--bg5);transition:background .3s}
.ps.done{background:var(--azure)}
.ps.active{background:var(--azure);opacity:.5}

.page{flex:1;display:flex;flex-direction:column;align-items:center;padding:40px 24px 80px}
.page-inner{width:100%;max-width:720px}

/* ── WELCOME ── */
.welcome{display:flex;flex-direction:column;align-items:center;text-align:center;padding:60px 24px;gap:24px}
.welcome .logo-big{font-size:24px;font-weight:700;letter-spacing:-0.02em}
.welcome .logo-big .dot{color:var(--red)}
.welcome h1{font-size:32px;font-weight:700;letter-spacing:-0.03em;line-height:1.2}
.welcome h1 em{font-style:normal;color:var(--azure)}
.welcome p{font-size:15px;color:var(--fg2);max-width:480px;line-height:1.7}
.code-tag{font-family:var(--mono);font-size:12px;color:var(--azure);background:var(--azure-dim);padding:4px 10px;border-radius:4px;display:inline-block;margin-bottom:8px}
.pills{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:4px}
.pill{font-size:11px;color:var(--fg3);background:var(--bg3);border:1px solid var(--border);padding:3px 10px;border-radius:100px;font-family:var(--mono)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:var(--radius);font-size:14px;font-weight:500;border:none;transition:all .15s}
.btn-primary{background:var(--azure);color:#fff}
.btn-primary:hover{background:var(--azure-hover)}
.btn-secondary{background:var(--bg3);color:var(--fg);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--bg4)}
.btn-lg{padding:13px 28px;font-size:15px;border-radius:10px}
.btn-ghost{background:transparent;color:var(--fg2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg3)}

/* ── NAV BAR ── */
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);padding:12px 24px;display:flex;justify-content:space-between;align-items:center;z-index:100}
.nav-bar .count{font-size:12px;color:var(--fg3);font-family:var(--mono)}

/* ── SECTION HEADER ── */
.section-hd{margin-bottom:28px}
.section-hd h2{font-size:22px;font-weight:700;letter-spacing:-0.02em}
.section-hd p{font-size:14px;color:var(--fg2);margin-top:6px}

/* ── FORM ── */
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:13px;font-weight:500;color:var(--fg2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.form-group input,.form-group select{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--fg);font-family:var(--font);font-size:14px;padding:10px 14px;border-radius:var(--radius);outline:none;transition:border .2s}
.form-group input:focus,.form-group select:focus{border-color:var(--azure)}
.form-group select option{background:var(--bg3)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* ── SECTOR GRID ── */
.sector-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.sector-card{background:var(--bg3);border:2px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center;cursor:pointer;transition:all .15s}
.sector-card:hover{border-color:var(--fg3)}
.sector-card.selected{border-color:var(--azure);background:var(--azure-dim)}
.sector-card .code{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--azure);margin-bottom:4px}
.sector-card .name{font-size:12px;color:var(--fg2)}

/* ── CATEGORY BLOCKS ── */
.cat-block{margin-bottom:20px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.cat-hd{background:var(--bg2);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.cat-hd:hover{background:var(--bg3)}
.cat-hd h3{font-size:13px;font-weight:600;color:var(--fg)}
.cat-hd .cat-meta{display:flex;align-items:center;gap:10px}
.cat-badge{font-size:11px;font-family:var(--mono);color:var(--fg3)}
.cat-count{font-size:11px;font-family:var(--mono);color:var(--azure)}
.chevron{font-size:12px;color:var(--fg3);transition:transform .2s}
.chevron.open{transform:rotate(180deg)}
.cat-body{padding:8px 0}

/* ── ITEM ROWS ── */
.item-row{display:flex;align-items:flex-start;gap:12px;padding:8px 16px;cursor:pointer;transition:background .1s}
.item-row:hover{background:var(--bg3)}
.item-row.selected{background:var(--azure-dim)}
.item-row input[type="checkbox"]{width:16px;height:16px;accent-color:var(--azure);flex-shrink:0;margin-top:2px;cursor:pointer}
.item-content{flex:1}
.item-id{font-family:var(--mono);font-size:10px;color:var(--fg3);display:block}
.item-name{font-size:13px;color:var(--fg);line-height:1.4}
.item-badges{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap}
.badge{font-size:10px;padding:2px 6px;border-radius:4px;font-family:var(--mono);font-weight:500}
.badge-shallow{background:rgba(16,185,129,0.15);color:#10b981}
.badge-deep{background:rgba(139,92,246,0.15);color:#8b5cf6}
.badge-mixta{background:rgba(245,158,11,0.15);color:#f59e0b}
.badge-cac{background:rgba(220,38,38,0.15);color:#ef4444}
.badge-sector{background:var(--bg4);color:var(--fg3)}

/* ── TOOLS GRID ── */
.tools-group{margin-bottom:24px}
.tools-group h3{font-size:12px;font-weight:600;color:var(--fg3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px}
.tool-card{background:var(--bg3);border:2px solid var(--border);border-radius:var(--radius);padding:10px 12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px}
.tool-card:hover{border-color:var(--fg3)}
.tool-card.selected{border-color:var(--azure);background:var(--azure-dim)}
.tool-id{font-family:var(--mono);font-size:10px;color:var(--fg3);flex-shrink:0}
.tool-name{font-size:12px;color:var(--fg);font-weight:500}

/* ── NATURE STEP ── */
.nature-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:28px;margin-bottom:20px}
.nature-card h3{font-size:15px;font-weight:600;margin-bottom:20px}
.slider-wrap{margin:8px 0 16px}
.slider-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--fg3);margin-bottom:6px;font-family:var(--mono)}
input[type="range"]{width:100%;accent-color:var(--azure);height:6px}
.nature-val{text-align:center;font-family:var(--mono);font-size:13px;color:var(--azure);margin-top:8px}
.radio-group{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.radio-opt{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg3);border:2px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .15s}
.radio-opt:hover{border-color:var(--fg3)}
.radio-opt.selected{border-color:var(--azure);background:var(--azure-dim)}
.radio-opt input{accent-color:var(--azure);width:15px;height:15px}
.radio-opt span{font-size:13px;color:var(--fg)}
.q-label{font-size:13px;font-weight:500;color:var(--fg2);margin-bottom:10px;display:block}

/* ── RESULTS ── */
.results-hero{background:linear-gradient(135deg,var(--bg2) 0%,var(--bg3) 100%);border:1px solid var(--border);border-radius:12px;padding:28px;margin-bottom:24px}
.results-hero .r-name{font-size:22px;font-weight:700;letter-spacing:-0.02em}
.results-hero .r-meta{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}
.r-meta-item{font-size:12px;color:var(--fg3);display:flex;align-items:center;gap:4px;font-family:var(--mono)}
.r-meta-item strong{color:var(--fg2)}
.nature-gauge{display:inline-flex;align-items:center;gap:8px;background:var(--bg4);border:1px solid var(--border);padding:4px 12px;border-radius:100px;font-size:12px;color:var(--fg2);margin-top:12px;font-family:var(--mono)}

.results-section{margin-bottom:32px}
.results-section h3{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.results-section h3 .tag{font-size:11px;font-family:var(--mono);color:var(--fg3);font-weight:400}

.agent-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px;transition:border .2s}
.agent-card:hover{border-color:var(--border-az)}
.agent-card.cac-card{border-left:3px solid var(--red)}
.agent-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.agent-info{flex:1}
.agent-rank{font-family:var(--mono);font-size:11px;color:var(--fg3);margin-bottom:2px}
.agent-name{font-size:15px;font-weight:600;letter-spacing:-0.01em}
.agent-purp{font-size:12px;color:var(--fg2);margin-top:3px}
.agent-badges{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.score-wrap{text-align:right;flex-shrink:0}
.score-num{font-size:22px;font-weight:700;color:var(--azure);font-family:var(--mono)}
.score-lbl{font-size:10px;color:var(--fg3)}
.score-bar-wrap{margin-top:10px;background:var(--bg4);border-radius:4px;height:4px;overflow:hidden}
.score-bar{height:4px;background:var(--azure);border-radius:4px;transition:width .5s ease}
.cac-warning{background:rgba(220,38,38,0.08);border:1px solid rgba(220,38,38,0.2);border-radius:6px;padding:8px 12px;margin-top:10px;font-size:11px;color:#ef4444;display:flex;align-items:flex-start;gap:6px}
.cac-warning strong{font-weight:600}

.summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.sum-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px}
.sum-card .sum-num{font-size:28px;font-weight:700;color:var(--azure);font-family:var(--mono);letter-spacing:-0.03em}
.sum-card .sum-lbl{font-size:12px;color:var(--fg2);margin-top:2px}
.sum-card .sum-sub{font-size:11px;color:var(--fg3);margin-top:6px;font-family:var(--mono)}

.detail-list{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.detail-row{display:flex;align-items:flex-start;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border)}
.detail-row:last-child{border-bottom:none}
.detail-id{font-family:var(--mono);font-size:10px;color:var(--azure);width:72px;flex-shrink:0;padding-top:2px}
.detail-name{font-size:12px;color:var(--fg);flex:1}
.detail-badge{font-size:10px;font-family:var(--mono);color:var(--fg3);padding:2px 6px;background:var(--bg4);border-radius:4px;flex-shrink:0}

.empty-state{text-align:center;padding:32px;color:var(--fg3);font-size:13px}

.print-btn{display:flex;align-items:center;gap:8px;margin:0 auto;padding:12px 24px}
@media print{.topbar,.progress-wrap,.nav-bar,.print-btn{display:none!important}.page{padding:20px}.agent-card,.detail-list{page-break-inside:avoid}}

/* ── MISC ── */
.divider{height:1px;background:var(--border);margin:24px 0}
.tip{font-size:12px;color:var(--fg3);background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 12px;margin-bottom:16px;font-family:var(--mono)}
.tip strong{color:var(--fg2)}
.select-all-row{padding:8px 16px;display:flex;justify-content:flex-end}
.select-all-row button{background:none;border:none;font-size:11px;color:var(--azure);font-family:var(--mono);cursor:pointer}
.select-all-row button:hover{text-decoration:underline}
/* Custom items */
.custom-section{margin-top:24px;border-top:1px solid var(--border);padding-top:20px}
.custom-section h4{font-size:12px;font-weight:600;color:var(--fg3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;font-family:var(--mono)}
.custom-items-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.custom-item-row{display:flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 12px}
.custom-item-row span{flex:1;font-size:13px;color:var(--fg1)}
.custom-item-row button{background:none;border:none;color:var(--fg3);font-size:16px;cursor:pointer;line-height:1;padding:0 2px}
.custom-item-row button:hover{color:#dc2626}
.custom-add-row{display:flex;gap:8px}
.custom-add-row input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:9px 12px;font-size:13px;color:var(--fg1);font-family:var(--sans)}
.custom-add-row input::placeholder{color:var(--fg3)}
.custom-add-row input:focus{outline:none;border-color:var(--azure)}
.custom-add-row button{background:var(--azure);color:#fff;border:none;border-radius:6px;padding:9px 14px;font-size:12px;font-family:var(--mono);cursor:pointer;white-space:nowrap}
.custom-add-row button:hover{opacity:.85}
/* Flow frequency */
.freq-row{background:var(--bg3);border-left:2px solid var(--azure);border-bottom:1px solid var(--border);border-right:1px solid var(--border);padding:7px 12px 7px 44px;display:flex;gap:6px;flex-wrap:wrap}
.freq-btn{padding:3px 10px;border-radius:4px;border:1px solid var(--border);background:var(--bg2);color:var(--fg3);font-size:11px;font-family:var(--mono);cursor:pointer;transition:all .15s}
.freq-btn.active{background:var(--azure);border-color:var(--azure);color:#fff}
.freq-btn:hover:not(.active){border-color:var(--azure);color:var(--azure)}
/* Persistence info */
.persist-info{font-size:12px;color:var(--fg3);font-family:var(--mono);padding:10px 14px;border:1px solid var(--border);border-radius:6px;background:var(--bg3);margin-top:12px;line-height:1.7}
.persist-info strong{color:var(--fg2)}
</style>
</head>

<script>

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function sectorMatch(secs, sector){
  if(!sector) return true;
  return secs.includes('ALL') || secs.includes(sector);
}

function natureBadge(nat){
  const map={D:'badge-deep',S:'badge-shallow',M:'badge-mixta'};
  const lbl={D:'Deep',S:'Shallow',M:'Mixta'};
  return `<span class="badge ${map[nat]||'badge-mixta'}">${lbl[nat]||nat}</span>`;
}

function getNatureScore(){
  let s = st.nature.slider;
  // Adjust based on extra questions
  const r = st.nature.rutina;
  if(r==='lt20') s = Math.min(100, s+10);
  if(r==='gt60') s = Math.max(0, s-10);
  const d = st.nature.decisiones;
  if(d==='10plus') s = Math.min(100, s+8);
  if(d==='1-2') s = Math.max(0, s-8);
  const a = st.nature.analisis;
  if(a==='siempre') s = Math.min(100, s+8);
  if(a==='nunca') s = Math.max(0, s-8);
  return Math.round(s);
}

function getNatureLabel(score){
  if(score >= 65) return {lbl:'Deep Work',code:'D',color:'#8b5cf6'};
  if(score <= 35) return {lbl:'Shallow Work',code:'S',color:'#10b981'};
  return {lbl:'Trabajo Mixto',code:'M',color:'#f59e0b'};
}

function scoreAgents(){
  const sec = st.profile.sector;
  const natScore = getNatureScore();
  const natInfo = getNatureLabel(natScore);
  return AGENTS.map(ag=>{
    // Hard filter: sector
    if(!sectorMatch(ag.secs, sec)) return null;
    let score = 0;
    // Cases: +3
    ag.cs.forEach(c=>{ if(st.selCases.has(c)) score+=3; });
    // Flows: +2
    ag.fs.forEach(f=>{ if(st.selFlows.has(f)) score+=2; });
    // Tools: +1
    ag.ts.forEach(t=>{ if(st.selTools.has(t)) score+=1; });
    // Nature: +2
    if(natInfo.code===ag.nat) score+=2;
    else if(ag.nat==='M') score+=1;
    return {...ag, score};
  }).filter(Boolean).sort((a,b)=>b.score-a.score);
}

function go(step){

// RENDER
// ═══════════════════════════════════════════════
const APP = document.getElementById('app');

function render(){
  saveToLS();
  const steps = [null,'Perfil','Casos de uso','Flujos','Herramientas','Naturaleza','Resultados'];
  const topbarHtml = `
    <div class="topbar">
      <span class="logo">adaptative<span class="dot">.</span></span>
      <span class="step-label">${st.step>0&&st.step<6?`${st.step}/5 · ${steps[st.step]}`:st.step===6?'Tu Sistema':'IA Selector'}</span>
    </div>`;

  const progressHtml = st.step>0&&st.step<6 ? `
    <div class="progress-wrap">
      <div class="progress-steps" style="max-width:600px;margin:0 auto">
        ${[1,2,3,4,5].map(i=>`<div class="ps ${i<st.step?'done':i===st.step?'active':''}"></div>`).join('')}
      </div>
    </div>` : '';

  let bodyHtml = '';
  switch(st.step){
    case 0: bodyHtml = renderWelcome(); break;
    case 1: bodyHtml = renderPerfil(); break;
    case 2: bodyHtml = renderCasos(); break;
    case 3: bodyHtml = renderFlujos(); break;
    case 4: bodyHtml = renderHerramientas(); break;
    case 5: bodyHtml = renderNaturaleza(); break;
    case 6: bodyHtml = renderResultados(); break;
  }

  APP.innerHTML = topbarHtml + progressHtml + bodyHtml;
  attachEvents();
}

  const rOpts = [

    {v:'20-40',l:'Entre 20-40% (algo rutinario, resto analítico)'},
    {v:'40-60',l:'Entre 40-60% (equilibrado)'},

      <div class="radio-group">${mkRadio('rutina',rOpts,rutina)}</div>
    </div>

    <div class="nature-card">
      <h3>¿Cuántas decisiones complejas tomas por semana?</h3>
      <p style="font-size:12px;color:var(--fg3);margin-bottom:12px">Por compleja: decisiones que requieren análisis, trade-offs, múltiples variables.</p>
      <div class="radio-group">${mkRadio('decisiones',dOpts,decisiones)}</div>

// EVENT HANDLERS
// ═══════════════════════════════════════════════
function attachEvents(){
  // Inputs are handled via oninput/onclick attributes inline
}

function setSector(code){
  st.profile.sector = st.profile.sector===code ? '' : code;
  render();
}

function handleNext1(){
  const n = document.getElementById('inp-nombre');
  const r = document.getElementById('inp-rol');
  const e = document.getElementById('inp-empresa');
  const em = document.getElementById('inp-email');
  if(n) st.profile.nombre = n.value;
  if(r) st.profile.rol = r.value;
  if(e) st.profile.empresa = e.value;
  if(em) st.profile.email = em.value;
  go(2);
}

function toggleCase(id){
  st.selCases.has(id) ? st.selCases.delete(id) : st.selCases.add(id);
  render();
}

function toggleFlow(id){
  st.selFlows.has(id) ? st.selFlows.delete(id) : st.selFlows.add(id);
  render();
}

function toggleTool(id){
  st.selTools.has(id) ? st.selTools.delete(id) : st.selTools.add(id);
  render();
}

function toggleCat(id){
  st.catOpen[id] = !st.catOpen[id];
  render();
}

function toggleGrp(id){
  st.grpOpen[id] = !st.grpOpen[id];
  render();
}

function selectAllCat(catId, ...ids){
  const items = CASES.filter(c=>c.cat===catId);
  const allSel = items.every(c=>st.selCases.has(c.id));
  items.forEach(c=> allSel ? st.selCases.delete(c.id) : st.selCases.add(c.id));
  render();
}

function setNature(key, val){
  st.nature[key] = st.nature[key]===val ? null : val;
  render();
}

function buildFreqBar(flowId){
  const freqs=['diario','semanal','mensual','trimestral','anual'];
  return `<div class="freq-row">${freqs.map(f=>`<button class="freq-btn ${st.flowFreqs[flowId]===f?'active':''}" onclick="event.stopPropagation();setFlowFreq('${flowId}','${f}')">${f}</button>`).join('')}</div>`;
}

function addCustomItem(type){
  const ids={cases:'custom-case-input',flows:'custom-flow-input',tools:'custom-tool-input'};
  const el=document.getElementById(ids[type]);
  if(!el||!el.value.trim()) return;
  const val=el.value.trim();
  if(type==='cases') st.customCases.push(val);
  else if(type==='flows') st.customFlows.push(val);
  else st.customTools.push(val);
  render();
}

function removeCustomItem(type,idx){
  if(type==='cases') st.customCases.splice(idx,1);
  else if(type==='flows') st.customFlows.splice(idx,1);
  else st.customTools.splice(idx,1);
  render();
}

function setFlowFreq(flowId,freq){
  if(st.flowFreqs[flowId]===freq) delete st.flowFreqs[flowId];
  else st.flowFreqs[flowId]=freq;
  render();
}

function escH(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderSliderLabel(val){
  const el = document.getElementById('slider-label');
  st.nature.slider = parseInt(val);
  if(el){
    const v = parseInt(val);
    el.textContent = v<=30?'Principalmente Shallow Work':v<=60?'Balance Shallow / Deep Work':'Principalmente Deep Work';
    // Also update the combined score display live
    const ns = getNatureScore();
    const ni = getNatureLabel(ns);
    const combo = document.getElementById('nature-combo');
    if(combo){
      combo.style.color = ni.color;
      combo.textContent = ni.lbl + ` (${ns}/100)`;
    }
  }
}

// ═══════════════════════════════════════════════
// EXPORT FUNCTIONS
// ═══════════════════════════════════════════════

function buildResultsPayload(){
  const p = st.profile;
  const natScore = getNatureScore();
  const natInfo = getNatureLabel(natScore);
  const ranked = scoreAgents();
  const top10 = ranked.slice(0,10);
  const selCasesArr = CASES.filter(c=>st.selCases.has(c.id));
  const selFlowsArr = FLOWS.filter(f=>st.selFlows.has(f.id));
  const selToolsArr = TOOLS.filter(t=>st.selTools.has(t.id));
  return {
    meta: {
      generado: new Date().toISOString(),
      version: 'adaptative. Matriz Maestra v0.2',
      metodologia: 'Scoring §8.3 — caso=+3 · flujo=+2 · herramienta=+1 · naturaleza=+2'
    },
    perfil: {
      nombre: p.nombre||'—',
      rol: p.rol||'—',
      empresa: p.empresa||'—',
      sector: p.sector ? (SECTORS.find(s=>s.code===p.sector)?.name||p.sector) : '—',
      email: p.email||'—'
    },
    naturaleza: {
      score: natScore,
      clasificacion: natInfo.lbl,
      slider: st.nature.slider,
      rutina: st.nature.rutina,
      decisiones: st.nature.decisiones,
      analisis: st.nature.analisis
    },
    seleccion: {
      casos: selCasesArr.map(c=>({id:c.id, nombre:c.n, naturaleza:c.nat})),
      casos_propios: st.customCases,
      flujos: selFlowsArr.map(f=>({id:f.id, nombre:f.n, frecuencia:st.flowFreqs[f.id]||null})),
      flujos_propios: st.customFlows,
      herramientas: selToolsArr.map(t=>({id:t.id, nombre:t.n})),
      herramientas_propias: st.customTools
    },
    top10_agentes: top10.map((ag,i)=>({
      rank: i+1,
      id: ag.id,
      nombre: ag.n,
      familia: FAMILIES[ag.fam]||ag.fam,
      naturaleza: ag.nat,
      cara_a_cliente: ag.cac,
      proposito: ag.purp,
      puntaje: ag.score
    }))
  };
}

function exportJSON(){
  const data = buildResultsPayload();
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const nombre = (st.profile.empresa||'resultado').replace(/\s+/g,'-').toLowerCase();
  a.href = url;
  a.download = `ia-selector-${nombre}-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showExportMsg('JSON descargado correctamente.');
}

function exportMarkdown(){
  const d = buildResultsPayload();
  const p = d.perfil;
  const nat = d.naturaleza;
  const sel = d.seleccion;
  const top = d.top10_agentes;

  let md = `# IA Selector · adaptative.\n`;
  md += `> ${d.meta.version} · ${new Date().toLocaleDateString('es-CO')}\n\n`;
  md += `---\n\n`;
  md += `## Perfil\n`;
  md += `| Campo | Valor |\n|---|---|\n`;
  md += `| Nombre | ${p.nombre} |\n`;
  md += `| Rol | ${p.rol} |\n`;
  md += `| Empresa | ${p.empresa} |\n`;
  md += `| Sector | ${p.sector} |\n`;
  if(p.email!=='—') md += `| Email | ${p.email} |\n`;
  md += `\n## Naturaleza del Trabajo\n`;
  md += `**Clasificación:** ${nat.clasificacion} (score ${nat.score}/100)\n\n`;

  md += `## Top 10 Agentes Recomendados\n\n`;
  top.forEach(ag=>{
    md += `### #${ag.rank} · ${ag.nombre}\n`;
    md += `- **ID:** ${ag.id}  |  **Familia:** ${ag.familia}  |  **Puntaje:** ${ag.puntaje}\n`;
    md += `- **Naturaleza:** ${ag.naturaleza}  |  **Cara-a-cliente:** ${ag.cara_a_cliente?'⚠ Sí (requiere Niveles 3-4)':'No'}\n`;
    md += `- **Propósito:** ${ag.proposito}\n\n`;
  });

  md += `## Casos de Uso Seleccionados (${sel.casos.length})\n`;
  sel.casos.forEach(c=> md += `- \`${c.id}\` ${c.nombre}\n`);

  md += `\n## Flujos Seleccionados (${sel.flujos.length})\n`;
  sel.flujos.forEach(f=> md += `- \`${f.id}\` ${f.nombre}${f.frecuencia?' · **'+f.frecuencia+'**':''}\n`);
  if(sel.flujos_propios&&sel.flujos_propios.length){
    md += `\n### Flujos Adicionales Propuestos\n`;
    sel.flujos_propios.forEach(f=> md += `- ${f}\n`);
  }

  md += `\n## Herramientas en Stack (${sel.herramientas.length})\n`;
  sel.herramientas.forEach(t=> md += `- \`${t.id}\` ${t.nombre}\n`);
  if(sel.herramientas_propias&&sel.herramientas_propias.length){
    md += `\n### Herramientas Adicionales Propuestas\n`;
    sel.herramientas_propias.forEach(t=> md += `- ${t}\n`);
  }

  if(sel.casos_propios&&sel.casos_propios.length){
    md += `\n## Casos de Uso Adicionales Propuestos\n`;
    sel.casos_propios.forEach(c=> md += `- ${c}\n`);
  }

  md += `\n---\n_Generado por adaptative. IA Selector · ${d.meta.metodologia}_\n`;

  const blob = new Blob([md], {type:'text/markdown'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const nombre = (p.empresa||'resultado').replace(/\s+/g,'-').toLowerCase();
  a.href = url;
  a.download = `ia-selector-${nombre}-${new Date().toISOString().slice(0,10)}.md`;
  a.click();
  URL.revokeObjectURL(url);
  showExportMsg('Markdown descargado correctamente.');
}

function copyShareLink(){
  // Encode session state in URL hash for sharing
  const payload = {
    p: st.profile,
    c: [...st.selCases],
    f: [...st.selFlows],
    t: [...st.selTools],
    n: st.nature,
    cc: st.customCases,
    cf: st.customFlows,
    ct: st.customTools,
    ff: st.flowFreqs
  };
  try {
    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
    const url = window.location.href.split('#')[0] + '#s=' + encoded;
    navigator.clipboard.writeText(url).then(()=>{
      showExportMsg('Enlace copiado. Compártelo para recuperar esta sesión.');
      const btn = document.getElementById('share-btn');
      if(btn){ btn.textContent='✓ Copiado'; setTimeout(()=>{ btn.textContent='⬡ Copiar enlace'; },2000); }
    }).catch(()=>{
      prompt('Copia este enlace:', url);
    });
  } catch(e){ showExportMsg('Error al generar enlace.'); }
}

function showExportMsg(msg){
  const el = document.getElementById('export-msg');
  if(el){ el.style.display='block'; el.textContent='✓ '+msg; setTimeout(()=>{ el.style.display='none'; },3500); }
}

// ═══════════════════════════════════════════════
// PERSISTENCE — localStorage + remote submit
// ═══════════════════════════════════════════════
const LS_KEY = 'adaptative_ia_selector_v1';

function saveToLS(){
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({
      step: st.step,
      profile: st.profile,
      selCases: [...st.selCases],
      selFlows: [...st.selFlows],
      selTools: [...st.selTools],
      nature: st.nature,
      customCases: st.customCases,
      customFlows: st.customFlows,
      customTools: st.customTools,
      flowFreqs: st.flowFreqs,
      savedAt: new Date().toISOString()
    }));
  } catch(e){}
}

function loadFromLS(){
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return false;
    const d = JSON.parse(raw);
    if(d.profile) st.profile = d.profile;
    if(d.selCases) st.selCases = new Set(d.selCases);
    if(d.selFlows) st.selFlows = new Set(d.selFlows);
    if(d.selTools) st.selTools = new Set(d.selTools);
    if(d.nature) st.nature = {...st.nature,...d.nature};
    if(d.customCases) st.customCases = d.customCases;
    if(d.customFlows) st.customFlows = d.customFlows;
    if(d.customTools) st.customTools = d.customTools;
    if(d.flowFreqs) st.flowFreqs = d.flowFreqs;
    if(typeof d.step==='number') st.step = d.step;
    return true;
  } catch(e){ return false; }
}

function submitResults(){
  const data = buildResultsPayload();
  const btn = document.getElementById('submit-btn');
  if(btn){ btn.textContent='Enviando...'; btn.disabled=true; }
  fetch('https://formsubmit.co/ajax/andres.venegas@metalatam.com',{
    method:'POST',
    headers:{'Content-Type':'application/json','Accept':'application/json'},
    body: JSON.stringify({
      _subject: 'IA Selector · '+(data.perfil.nombre||'Anónimo')+' — '+(data.perfil.empresa||'—'),
      _replyto: data.perfil.email||'sin-email',
      nombre: data.perfil.nombre,
      empresa: data.perfil.empresa,
      sector: data.perfil.sector,
      rol: data.perfil.rol,
      email: data.perfil.email,
      naturaleza: data.naturaleza.clasificacion+' ('+data.naturaleza.score+'/100)',
      top5_agentes: data.top10_agentes.slice(0,5).map(a=>a.rank+'. '+a.nombre+' ['+a.puntaje+'pts]').join(' | '),
      casos: data.seleccion.casos.length+' del sistema + '+st.customCases.length+' propios',
      flujos: data.seleccion.flujos.length+' del sistema + '+st.customFlows.length+' propios',
      herramientas: data.seleccion.herramientas.length+' del sistema + '+st.customTools.length+' propias',
      frecuencias_flujos: Object.entries(st.flowFreqs).map(([k,v])=>k+':'+v).join(', ')||'—',
      items_propios: [...st.customCases.map(c=>'[caso] '+c),...st.customFlows.map(f=>'[flujo] '+f),...st.customTools.map(t=>'[herramienta] '+t)].join(' | ')||'—',
      datos_completos: JSON.stringify(data,null,2)
    })
  }).then(r=>r.json()).then(()=>{
    if(btn){btn.textContent='✓ Resultados enviados';btn.style.background='#10b981';btn.style.borderColor='#10b981';}
    showExportMsg('Resultados enviados a adaptative. ✓');
  }).catch(()=>{
    if(btn){btn.textContent='⬆ Enviar resultados a adaptative.';btn.disabled=false;}
    showExportMsg('Error al enviar. Descarga el JSON y envíalo por email.');
  });
}

// Restore session from URL hash on load
function tryRestoreSession(){
  try {
    const hash = window.location.hash;
    if(hash.startsWith('#s=')){
      const raw = decodeURIComponent(escape(atob(hash.slice(3))));
      const saved = JSON.parse(raw);
      if(saved.p) st.profile = saved.p;
      if(saved.c) st.selCases = new Set(saved.c);
      if(saved.f) st.selFlows = new Set(saved.f);
      if(saved.t) st.selTools = new Set(saved.t);
      if(saved.n) st.nature = {...st.nature,...saved.n};
      if(saved.cc) st.customCases = saved.cc;
      if(saved.cf) st.customFlows = saved.cf;
      if(saved.ct) st.customTools = saved.ct;
      if(saved.ff) st.flowFreqs = saved.ff;
      st.step = 6; // jump to results
      return true;
    }
  } catch(e){ /* ignore */ }
  return false;
}

// ═══════════════════════════════════════════════

if(!tryRestoreSession()) loadFromLS();
render();
